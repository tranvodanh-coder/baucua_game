<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bầu cua</title>
    <link rel="icon" href="./img/favicon.png">
    <!-- My style -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <header class="header">
            <div class="header__avatar">
                <img src="./img/user.png" />
            </div>
            <div class="header__bet">Bàn cược: ?đ</div>
            <div class="header__money">
                <img src="./img/money.png" />
                <span class="money-text">Tiền: ?đ</span>
            </div>
        </header>
        <section class="figure">
            <div class="figure__item" data-id="0">
                <div class="figure__item--group">
                    <img src="./img/deer.png" />
                    <label>Đặt cược: 0</label>
                </div>
            </div>
            <div class="figure__item" data-id="1">
                <div class="figure__item--group">
                    <img src="./img/calabash.png" />
                    <label>Đặt cược: 0</label>
                </div>
            </div>
            <div class="figure__item" data-id="2">
                <div class="figure__item--group">
                    <img src="./img/chicken.png" />
                    <label>Đặt cược: 0</label>
                </div>
            </div>
            <div class="figure__item" data-id="3">
                <div class="figure__item--group">
                    <img src="./img/fish.png" />
                    <label>Đặt cược: 0</label>
                </div>
            </div>
            <div class="figure__item" data-id="4">
                <div class="figure__item--group">
                    <img src="./img/crab.png" />
                    <label>Đặt cược: 0</label>
                </div>
            </div>
            <div class="figure__item" data-id="5">
                <div class="figure__item--group">
                    <img src="./img/shrimp.png" />
                    <label>Đặt cược: 0</label>
                </div>
            </div>
        </section>
        <section class="figure figure--small">
            <div class="figure__item">
                <div class="figure__item--group">
                    <img src="./img/deer.png" />
                </div>
            </div>
            <div class="figure__item">
                <div class="figure__item--group">
                    <img src="./img/deer.png" />
                </div>
            </div>
            <div class="figure__item">
                <div class="figure__item--group">
                    <img src="./img/deer.png" />
                </div>
            </div>
        </section>
        <section class="play">
            <button class="btn btn__start">Chơi ngay</button>
        </section>
    </main>
    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js" integrity="sha512-aVKKRRi/Q/YV+4mjoKBsE4x3H+BkegoM/em46NNlCqNTmUYADjBbeNefNxYV7giUp0VxICtqdrbqU7iVaeZNXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- My script -->
    <script src="main.js"></script>
</body>

</html>
